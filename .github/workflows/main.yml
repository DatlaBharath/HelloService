name: CI/CD Pipeline

on:
  push:
    branches:
      - new-branch

jobs:
  build_project:
    name: Build Project
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Maven (if not already installed)
        run: |
          sudo apt update
          sudo apt install -y maven
      
      - name: Build with Maven
        run: mvn clean install -Dmaven.test.skip=true

  build_image:
    name: Build Docker Image
    runs-on: self-hosted
    needs: build_project
    steps:
      - name: Build Docker image
        run: docker build -t sakthisiddu1/helloservice:${{ github.run_number }} .

  push_image:
    name: Push Docker Image to Docker Hub
    runs-on: self-hosted
    needs: build_image
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Push Docker image
        run: docker push sakthisiddu1/helloservice:${{ github.run_number }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: push_image
    steps:
      - name: Create Deployment YAML
        run: |
          cat <<EOF > deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: helloservice-deployment
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: helloservice
            template:
              metadata:
                labels:
                  app: helloservice
              spec:
                containers:
                - name: helloservice
                  image: sakthisiddu1/helloservice:${{ github.run_number }}
                  ports:
                  - containerPort: 5000
          EOF
      
      - name: Create Service YAML
        run: |
          cat <<EOF > service.yaml
          apiVersion: v1
          kind: Service
          metadata:
            name: helloservice-service
          spec:
            type: NodePort
            selector:
              app: helloservice
            ports:
              - port: 5000
                targetPort: 5000
                nodePort: 30007
          EOF
      
      - name: Deploy to Kubernetes
        run: |
          ssh -o StrictHostKeyChecking=no -i /home/ubuntu/.ssh/test.pem ubuntu@$(hostname of your k8s server) 'kubectl apply -f -' < deployment.yaml
          ssh -o StrictHostKeyChecking=no -i /home/ubuntu/.ssh/test.pem ubuntu@$(hostname of your k8s server) 'kubectl apply -f -' < service.yaml